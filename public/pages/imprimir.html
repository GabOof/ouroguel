<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
        <title>Contrato de Locação - Ouroguel</title>

        <style>
            :root {
                --primary: #1f2937;
                --primary-dark: #111827;
                --secondary: #374151;
                --border: #d1d5db;
                --muted: #6b7280;
                --bg: #f3f4f6;
                --paper: #ffffff;
                --danger: #b91c1c;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            body {
                background: var(--bg);
                color: #111827;
                font-size: 14px;
                line-height: 1.45;
                padding: 24px;
            }

            .print-controls {
                max-width: 210mm;
                margin: 0 auto 20px auto;
                background: var(--paper);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 16px;
                display: flex;
                justify-content: center;
                gap: 12px;
                flex-wrap: wrap;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            }

            .btn {
                min-height: 46px;
                padding: 12px 20px;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: 0.2s ease;
            }

            .btn-primary {
                background: var(--primary);
                color: white;
            }

            .btn-secondary {
                background: #e5e7eb;
                color: #111827;
                border: 1px solid var(--border);
            }

            .btn-danger {
                background: #fee2e2;
                color: var(--danger);
                border: 1px solid #fecaca;
            }

            .btn:hover {
                filter: brightness(0.95);
                transform: translateY(-1px);
            }

            .container {
                width: 210mm;
                min-height: 297mm;
                margin: 0 auto;
                background: var(--paper);
                padding: 14mm;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            }

            .loading,
            .error {
                min-height: 220px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                gap: 12px;
            }

            .loading-title,
            .error-title {
                font-size: 22px;
                font-weight: 800;
            }

            .error-title {
                color: var(--danger);
            }

            .contract-header {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 16px;
                border-bottom: 3px solid var(--primary-dark);
                padding-bottom: 14px;
                margin-bottom: 18px;
            }

            .company-name {
                font-size: 26px;
                font-weight: 900;
                letter-spacing: 0.5px;
                color: var(--primary-dark);
            }

            .company-subtitle {
                font-size: 14px;
                font-weight: 700;
                color: var(--secondary);
                margin-top: 4px;
            }

            .company-info {
                font-size: 12px;
                color: var(--muted);
                margin-top: 8px;
            }

            .contract-badge {
                border: 2px solid var(--primary-dark);
                padding: 10px 14px;
                text-align: center;
                min-width: 150px;
                align-self: start;
            }

            .contract-badge span {
                display: block;
                font-size: 11px;
                color: var(--muted);
                font-weight: 700;
            }

            .contract-badge strong {
                display: block;
                margin-top: 4px;
                font-size: 16px;
                letter-spacing: 1px;
            }

            .document-title {
                text-align: center;
                margin: 18px 0 20px;
                padding: 12px;
                border: 2px solid var(--primary-dark);
                background: #f9fafb;
                font-size: 18px;
                font-weight: 900;
                text-transform: uppercase;
            }

            .section {
                margin-bottom: 18px;
                page-break-inside: avoid;
            }

            .section-title {
                font-size: 15px;
                font-weight: 900;
                color: var(--primary-dark);
                padding-bottom: 5px;
                border-bottom: 2px solid var(--primary-dark);
                margin-bottom: 10px;
                text-transform: uppercase;
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            .info-table td,
            .equipment-table th,
            .equipment-table td {
                border: 1px solid var(--border);
                padding: 8px;
                vertical-align: top;
            }

            .info-table .label {
                width: 22%;
                background: #f9fafb;
                font-weight: 800;
                color: var(--primary-dark);
            }

            .equipment-table th {
                background: var(--primary);
                color: white;
                text-align: left;
                font-size: 13px;
            }

            .equipment-table td {
                font-size: 13px;
            }

            .equipment-name {
                font-weight: 800;
            }

            .equipment-meta {
                color: var(--muted);
                font-size: 12px;
                margin-top: 3px;
            }

            .important-box {
                border: 2px solid var(--primary-dark);
                padding: 10px;
                background: #fff;
                font-weight: 700;
            }

            .warning-box {
                border: 2px solid #f59e0b;
                background: #fffbeb;
                padding: 12px 14px;
                color: #92400e;
                font-weight: 700;
                margin-top: 12px;
            }

            .terms {
                border: 1px solid var(--border);
                background: #f9fafb;
                padding: 12px 14px;
            }

            .terms ul {
                padding-left: 20px;
            }

            .terms li {
                margin-bottom: 6px;
            }

            .warning {
                margin-top: 10px;
                color: var(--danger);
                font-weight: 900;
            }

            .signatures {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 32px;
                margin-top: 48px;
                page-break-inside: avoid;
            }

            .signature-box {
                text-align: center;
                border-top: 1px solid #111827;
                padding-top: 8px;
                font-size: 12px;
                min-height: 70px;
            }

            .signature-box strong {
                display: block;
                font-size: 13px;
                color: var(--primary-dark);
            }

            .footer {
                margin-top: 28px;
                padding-top: 10px;
                border-top: 1px solid var(--border);
                text-align: center;
                font-size: 11px;
                color: var(--muted);
            }

            .timestamp {
                text-align: right;
                color: var(--muted);
                font-size: 11px;
                margin-top: 14px;
            }

            .status-badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 4px;
                font-weight: 700;
                font-size: 12px;
            }

            .status-ativo {
                background: #dbeafe;
                color: #1e40af;
            }

            .status-finalizado {
                background: #d1fae5;
                color: #065f46;
            }

            .status-cancelado {
                background: #fee2e2;
                color: #991b1b;
            }

            @page {
                size: A4 portrait;
                margin: 7mm;
            }

            @media print {
                * {
                    -webkit-print-color-adjust: exact;
                    print-color-adjust: exact;
                }

                body {
                    background: white;
                    padding: 0;
                    font-size: 10px;
                    line-height: 1.25;
                    color: #111827;
                }

                .print-controls {
                    display: none !important;
                }

                .container {
                    width: 100%;
                    min-height: auto;
                    margin: 0;
                    padding: 0;
                    box-shadow: none;
                }

                .contract-header {
                    grid-template-columns: 1fr auto;
                    gap: 8px;
                    border-bottom: 2px solid var(--primary-dark);
                    padding-bottom: 6px;
                    margin-bottom: 7px;
                }

                .company-name {
                    font-size: 18px;
                    line-height: 1.05;
                    letter-spacing: 0.2px;
                }

                .company-subtitle {
                    font-size: 9px;
                    line-height: 1.2;
                    margin-top: 2px;
                }

                .company-info {
                    font-size: 8.5px;
                    line-height: 1.2;
                    margin-top: 3px;
                }

                .contract-badge {
                    min-width: 95px;
                    padding: 5px 7px;
                    border-width: 1.5px;
                }

                .contract-badge span {
                    font-size: 8px;
                }

                .contract-badge strong {
                    margin-top: 2px;
                    font-size: 11px;
                    letter-spacing: 0.4px;
                }

                .document-title {
                    margin: 7px 0 8px;
                    padding: 5px;
                    border-width: 1.5px;
                    font-size: 12px;
                    line-height: 1.15;
                }

                .section {
                    margin-bottom: 7px;
                    page-break-inside: auto;
                    break-inside: auto;
                }

                .section-title {
                    font-size: 10.5px;
                    padding-bottom: 2px;
                    margin-bottom: 4px;
                    border-bottom-width: 1.5px;
                    line-height: 1.15;
                }

                table {
                    width: 100%;
                    border-collapse: collapse;
                    page-break-inside: auto;
                    break-inside: auto;
                }

                tr {
                    page-break-inside: avoid;
                    break-inside: avoid;
                }

                thead {
                    display: table-header-group;
                }

                .info-table td,
                .equipment-table th,
                .equipment-table td {
                    padding: 3px 4px;
                    font-size: 9px;
                    line-height: 1.2;
                    vertical-align: top;
                }

                .info-table .label {
                    width: 19%;
                    font-size: 8.8px;
                    font-weight: 800;
                    white-space: nowrap;
                }

                .equipment-table th {
                    font-size: 8.8px;
                    line-height: 1.15;
                }

                .equipment-table td {
                    font-size: 9px;
                }

                .equipment-name {
                    font-weight: 800;
                }

                .equipment-meta,
                .equipment-table small {
                    font-size: 8px;
                    line-height: 1.1;
                }

                .status-badge {
                    padding: 1px 5px;
                    font-size: 8.5px;
                    border-radius: 3px;
                    line-height: 1.2;
                }

                .warning-box {
                    margin-top: 4px;
                    padding: 5px 6px;
                    font-size: 9px;
                    line-height: 1.25;
                    border-width: 1.5px;
                }

                .terms {
                    padding: 6px 8px;
                    font-size: 8.6px;
                    line-height: 1.18;
                    page-break-inside: auto;
                    break-inside: auto;
                }

                .terms ul {
                    padding-left: 13px;
                }

                .terms li {
                    margin-bottom: 2px;
                    padding-left: 1px;
                    page-break-inside: avoid;
                    break-inside: avoid;
                }

                .warning {
                    margin-top: 5px;
                    font-size: 8.8px;
                    line-height: 1.2;
                }

                .signatures {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 18px;
                    margin-top: 50px;
                    page-break-inside: avoid;
                    break-inside: avoid;
                }

                .signature-box {
                    min-height: 32px;
                    padding-top: 4px;
                    font-size: 8.5px;
                    line-height: 1.15;
                }

                .signature-box strong {
                    font-size: 9px;
                    margin-bottom: 1px;
                }

                .signature-box p {
                    margin-top: 1px;
                }

                .footer {
                    margin-top: 10px;
                    padding-top: 5px;
                    font-size: 8px;
                    line-height: 1.2;
                }

                .timestamp {
                    margin-top: 5px;
                    font-size: 8px;
                }
            }

            @media screen and (max-width: 900px) {
                body {
                    padding: 12px;
                }

                .container,
                .print-controls {
                    width: 100%;
                    max-width: 100%;
                }

                .contract-header {
                    grid-template-columns: 1fr;
                }

                .signatures {
                    grid-template-columns: 1fr;
                    gap: 48px;
                }
            }
        </style>

        <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    </head>
    <body>
        <div class="print-controls">
            <button type="button" class="btn btn-primary" onclick="window.print()">
                Imprimir contrato
            </button>

            <button type="button" class="btn btn-danger" onclick="window.close()">Fechar</button>
        </div>
        <main class="container" id="contractContainer">
            <section class="loading" id="loading">
                <div class="loading-title">Carregando contrato...</div>
                <p>Buscando dados do aluguel, cliente e equipamentos.</p>
            </section>
        </main>

        <script src="/js/firebase-config.js"></script>
        <script src="/js/auth.js"></script>
        <script src="/js/imprimir.js"></script>

        <!-- Acessibilidade em Libras - VLibras -->
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>

        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>
            new window.VLibras.Widget("https://vlibras.gov.br/app");
        </script>
    </body>
</html>
